<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- PLACEHOLDER: Don Rápido — awaiting Fabián's mascot image -->
  <defs>
    <linearGradient id="grad-donrapido" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8A951;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Base circle -->
  <circle cx="60" cy="60" r="55" fill="url(#grad-donrapido)" stroke="#0B1D3A" stroke-width="2" opacity="0.15"/>
  
  <!-- Truck body (simple) -->
  <rect x="25" y="45" width="50" height="25" rx="4" fill="#1B3A6B"/>
  
  <!-- Cabin -->
  <circle cx="35" cy="50" r="6" fill="#0B1D3A"/>
  
  <!-- Wheels -->
  <circle cx="30" cy="75" r="5" fill="#0B1D3A"/>
  <circle cx="65" cy="75" r="5" fill="#0B1D3A"/>
  
  <!-- Speed lines -->
  <line x1="10" y1="55" x2="20" y2="55" stroke="#C8A951" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="8" y1="65" x2="18" y2="65" stroke="#C8A951" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Lightning bolt (energía) -->
  <path d="M 75 35 L 85 50 L 78 50 L 90 70 L 70 55 L 77 55 Z" fill="#C8A951" opacity="0.9"/>
  
  <!-- Text badge -->
  <text x="60" y="105" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1B3A6B" text-anchor="middle">
    Don Rápido
  </text>
</svg>
