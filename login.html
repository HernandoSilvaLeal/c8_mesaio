<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceder · Mesaio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
<style>
  :root {
    --burgundy:#5C1A2B; --burgundy-dk:#3D0F1C; --burgundy-lt:#8B3A4E;
    --gold:#C8A951; --gold-lt:#E2C87A; --gold-dk:#9a7a1e;
    --cream:#FAF6EE; --charcoal:#1F1318; --charcoal-2:#5A4A4F;
    --border:#E8DDD0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',sans-serif;color:var(--charcoal);min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:linear-gradient(135deg,rgba(61,15,28,.92),rgba(92,26,43,.85)),url('https://images.pexels.com/photos/1581384/pexels-photo-1581384.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover;
       padding:24px}
  .login-wrap{background:var(--cream);border-radius:24px;padding:40px 36px;max-width:440px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .brand{text-align:center;margin-bottom:28px}
  .brand-name{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;color:var(--burgundy);letter-spacing:-.03em;margin:0}
  .brand-name span{color:var(--gold-dk)}
  .brand-sub{color:var(--charcoal-2);font-size:13px;margin-top:4px}
  .lbl{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:8px}
  .rol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
  .rol-btn{padding:16px 8px;border:2px solid var(--border);border-radius:10px;background:white;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
  .rol-btn:hover{border-color:var(--gold)}
  .rol-btn.active{border-color:var(--burgundy);background:#FAF6EE}
  .rol-btn .ico{font-size:26px;margin-bottom:4px}
  .rol-btn .name{font-size:12px;font-weight:600;color:#374151}
  .persona-btn{padding:12px 16px;border:2px solid var(--border);border-radius:8px;background:white;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all .2s;width:100%;font-family:inherit;margin-bottom:8px}
  .persona-btn:hover{border-color:var(--gold)}
  .persona-btn.active{border-color:var(--gold);background:#FAF6EE}
  .avatar{width:36px;height:36px;background:var(--burgundy);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:14px;flex-shrink:0}
  .persona-name{font-weight:600;color:#374151;font-size:14px}
  .persona-rol{font-size:11px;color:#9CA3AF;text-transform:capitalize}
  #btnEntrar{width:100%;padding:14px;background:var(--gold-dk);color:white;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;display:none;margin-top:4px;transition:all .2s}
  #btnEntrar:hover{background:var(--burgundy);transform:translateY(-1px)}
  .sesion-banner{background:#ECFDF5;border:1px solid #10B981;border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
  .back{display:block;text-align:center;margin-top:16px;color:var(--burgundy);font-size:13px;text-decoration:none;font-weight:600}
  .back:hover{color:var(--gold-dk)}
  details summary{font-size:12px;color:#9CA3AF;cursor:pointer;user-select:none}
  details[open] summary{margin-bottom:10px}
  .add-row{display:flex;gap:8px;margin-top:6px}
  .add-row input{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none}
  .add-row input:focus{border-color:var(--gold)}
  .add-row button{padding:10px 16px;background:var(--burgundy);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
</style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <h1 class="brand-name">Mes<span>aio</span></h1>
      <div class="brand-sub">Sistema integral de gestión</div>
    </div>

    <div id="sesionActiva"></div>

    <span class="lbl">Soy...</span>
    <div class="rol-grid">
      <button class="rol-btn" onclick="seleccionarRol('mesero', this)">
        <div class="ico">🧑‍🍽️</div><div class="name">Mesero</div>
      </button>
      <button class="rol-btn" onclick="seleccionarRol('cocina', this)">
        <div class="ico">👨‍🍳</div><div class="name">Cocina</div>
      </button>
      <button class="rol-btn" onclick="seleccionarRol('admin', this)">
        <div class="ico">👔</div><div class="name">Admin</div>
      </button>
    </div>

    <div id="selectorPersona" style="display:none;margin-bottom:16px;">
      <span class="lbl">¿Quién eres?</span>
      <div id="listaPersonas"></div>
      <div style="margin-top:10px;border-top:1px dashed #ddd;padding-top:10px;">
        <details>
          <summary>+ Agregar mi nombre</summary>
          <div class="add-row">
            <input type="text" id="nuevoNombre" placeholder="Tu nombre completo">
            <button onclick="agregarPersona()">Agregar</button>
          </div>
        </details>
      </div>
    </div>

    <button id="btnEntrar" onclick="entrarAlSistema()">Entrar →</button>
    <a href="/" class="back"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
  </div>

<script>
const USUARIOS_DEFAULT = {
  mesero: ['Carlos R.', 'Diana M.', 'Felipe T.', 'Ana L.'],
  cocina: ['Chef Héctor', 'Sous-chef María'],
  admin: ['Administrador']
};
const RUTAS = { mesero:'mesero/', cocina:'cocina/', admin:'admin/' };
let rolSeleccionado = null;
let personaSeleccionada = null;

function getUsuarios() {
  return JSON.parse(localStorage.getItem('mesaio_usuarios') || JSON.stringify(USUARIOS_DEFAULT));
}
function saveUsuarios(u) { localStorage.setItem('mesaio_usuarios', JSON.stringify(u)); }

function seleccionarRol(rol, btn) {
  rolSeleccionado = rol;
  personaSeleccionada = null;
  document.querySelectorAll('.rol-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const personas = getUsuarios()[rol] || [];
  document.getElementById('listaPersonas').innerHTML = personas.map(n => `
    <button class="persona-btn" onclick="seleccionarPersona('${n.replace(/'/g,"\\'")}', this)">
      <div class="avatar">${n.charAt(0).toUpperCase()}</div>
      <div><div class="persona-name">${n}</div><div class="persona-rol">${rol}</div></div>
    </button>`).join('');
  document.getElementById('selectorPersona').style.display = 'block';
  document.getElementById('btnEntrar').style.display = 'none';
}

function seleccionarPersona(nombre, btn) {
  personaSeleccionada = nombre;
  document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('btnEntrar').style.display = 'block';
}

function agregarPersona() {
  const nombre = document.getElementById('nuevoNombre').value.trim();
  if (!nombre || !rolSeleccionado) return;
  const u = getUsuarios();
  if (!u[rolSeleccionado].includes(nombre)) { u[rolSeleccionado].push(nombre); saveUsuarios(u); }
  document.getElementById('nuevoNombre').value = '';
  seleccionarRol(rolSeleccionado, document.querySelector('.rol-btn.active'));
}

function entrarAlSistema() {
  if (!rolSeleccionado || !personaSeleccionada) return;
  localStorage.setItem('mesaio_session', JSON.stringify({
    rol: rolSeleccionado, nombre: personaSeleccionada, timestamp: new Date().toISOString()
  }));
  window.location.href = RUTAS[rolSeleccionado];
}

// Banner sesión activa
(function() {
  const s = JSON.parse(localStorage.getItem('mesaio_session') || 'null');
  if (!s) return;
  const div = document.getElementById('sesionActiva');
  div.innerHTML = `<div class="sesion-banner">
    <div style="font-size:13px;"><strong style="color:#065F46;">Sesión activa:</strong> ${s.nombre} · <span style="text-transform:capitalize;">${s.rol}</span></div>
    <button onclick="window.location.href='${RUTAS[s.rol]}'" style="padding:6px 14px;background:#10B981;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold;">Continuar →</button>
  </div>`;
})();
</script>
</body>
</html>
